<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INSPECTOR GREP // TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      (function() {
        try {
          var target = window;
          var desc = Object.getOwnPropertyDescriptor(target, 'fetch');
          if (!desc || !desc.configurable) {
            target = Window.prototype;
            desc = Object.getOwnPropertyDescriptor(target, 'fetch');
          }
          if (desc && desc.configurable && (desc.get || !desc.writable)) {
            var originalFetch = window.fetch;
            Object.defineProperty(target, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Blocked fetch overwrite'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
